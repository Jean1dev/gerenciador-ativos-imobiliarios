version: '3.4'
services:
  mongodb:
    image: mongo:8.0
    ports:
      - "27017:27017"
    container_name: mongodb
    networks:
      - app-net

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    container_name: redis
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.200.0/24